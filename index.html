<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVC College of Engineering — Student Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#3B6FE0;
    --navy:#1A2540;
    --bg:#F5F7FB;
    --border:#DDE2EC;
    --muted:#8A93A6;
    --red:#C0392B;
    --red-light:#FDECEA;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--navy);position:relative;}
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:url('image.jpg');
    background-repeat:no-repeat;
    background-position:center;
    background-size:min(46vw,480px);
    opacity:0.07;
    pointer-events:none;
    z-index:0;
  }
  header, .container, #save-warning, .modal-overlay, .toast{position:relative;z-index:1;}
  h1,h2,h3{font-family:'Poppins',sans-serif;}
  ::selection{background:var(--blue);color:#fff;}
  button{cursor:pointer;font-family:'Inter',sans-serif;}
  input:focus, select:focus{outline:none;border-color:var(--blue) !important;box-shadow:0 0 0 3px rgba(59,111,224,0.15);}

  /* Header */
  header{background:linear-gradient(135deg,#1A2A57 0%,#2E4FA8 100%);padding:28px 24px;}
  .header-inner{max-width:1000px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;}
  .brand{display:flex;align-items:center;gap:14px;}
  .logo-circle{width:52px;height:52px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.2);padding:4px;}
  h1{margin:0;color:#fff;font-size:21px;font-weight:700;letter-spacing:-0.01em;}
  .sub-tag{margin:3px 0 0;color:rgba(255,255,255,0.75);font-size:12.5px;}
  .stat-row{display:flex;gap:24px;}
  .stat-box{text-align:center;}
  .stat-num{color:#fff;font-size:22px;font-weight:700;font-family:'Poppins',sans-serif;}
  .stat-label{color:rgba(255,255,255,0.7);font-size:10.5px;text-transform:uppercase;letter-spacing:0.05em;}

  #save-warning{display:none;background:var(--red-light);color:var(--red);padding:8px 24px;font-size:12.5px;align-items:center;gap:8px;justify-content:center;}

  .container{max-width:1000px;margin:0 auto;padding:24px;}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px;}
  .search-wrap{position:relative;flex:1 1 240px;}
  .search-wrap svg{position:absolute;left:12px;top:12px;pointer-events:none;}
  #search{width:100%;padding:10px 12px 10px 36px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;background:#fff;}
  select{padding:10px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:13.5px;background:#fff;color:#333;}
  .add-btn{display:flex;align-items:center;gap:6px;background:var(--blue);color:#fff;border:none;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:600;box-shadow:0 4px 12px rgba(59,111,224,0.3);}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
  .card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(20,30,60,0.06);transition:all 0.15s ease;position:relative;}
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(20,30,60,0.10);}
  .card-top{display:flex;align-items:flex-start;gap:12px;}
  .avatar{width:42px;height:42px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;font-family:'Poppins',sans-serif;flex-shrink:0;}
  .card-name{font-weight:600;font-size:15.5px;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card-roll{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--muted);margin-top:2px;}
  .card-actions{display:flex;gap:4px;}
  .icon-btn{background:transparent;border:none;padding:6px;border-radius:6px;display:flex;align-items:center;}
  .icon-btn:hover{background:rgba(59,111,224,0.1);}
  .dept-pill{display:inline-block;font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:20px;margin-top:12px;}
  .badge-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .mini-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;}
  .cgpa-badge{background:#EAF7EE;color:#1E7B3A;}
  .leave-badge{background:#FDF1E7;color:#B15B12;}
  .arrears-badge-clear{background:#EAF7EE;color:#1E7B3A;}
  .arrears-badge-alert{background:var(--red-light);color:var(--red);}
  .card-meta{display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-size:12px;color:var(--muted);flex-wrap:wrap;gap:6px;}
  .confirm-bar{margin-top:12px;padding-top:12px;border-top:1px solid #EEF0F5;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;}
  .confirm-delete-btn{background:var(--red);color:#fff;border:none;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;}
  .confirm-cancel-btn{background:#F0F2F7;color:#5B667A;border:none;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;}

  .empty-state{text-align:center;padding:60px 20px;display:flex;flex-direction:column;align-items:center;gap:12;}
  .empty-text{color:var(--muted);font-size:14.5px;margin:0;}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(20,30,60,0.45);display:none;align-items:center;justify-content:center;padding:20px;z-index:50;}
  .modal-overlay.open{display:flex;}
  .modal{background:#fff;border-radius:14px;padding:26px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .modal-title{margin:0;font-size:18px;font-weight:700;color:var(--navy);}
  .form-field{margin-bottom:14px;flex:1;}
  .form-row{display:flex;gap:12px;}
  label.field-label{display:block;font-size:12px;font-weight:600;color:#5B667A;margin-bottom:5px;}
  .input{width:100%;padding:9px 11px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;background:#fff;color:var(--navy);}
  .input.error{border-color:#E0554F;}
  .error-text{display:block;font-size:11.5px;color:#E0554F;margin-top:4px;}
  .modal-actions{display:flex;gap:10px;margin-top:8px;}
  .cancel-btn{flex:1;padding:10px;border-radius:8px;border:1.5px solid var(--border);background:#fff;color:#5B667A;font-size:14px;font-weight:600;}
  .save-btn{flex:1;padding:10px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-size:14px;font-weight:600;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:13.5px;box-shadow:0 8px 24px rgba(0,0,0,0.2);display:none;z-index:60;}
  .toast.show{display:block;}

  .fade-in{animation:fadeIn 0.25s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  @media (max-width:720px){
    .grid{grid-template-columns:1fr;}
    .stat-row{flex-wrap:wrap;}
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="logo-circle">
        <img src="image.jpg" alt="AVCCE crest" style="width:44px;height:44px;object-fit:contain;">
      </div>
      <div>
        <h1>AVC College of Engineering</h1>
        <p class="sub-tag">Department of Information Technology · Student Management System</p>
      </div>
    </div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Students</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-depts">0</div><div class="stat-label">Departments</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-cgpa">—</div><div class="stat-label">Avg CGPA</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-arrears">0</div><div class="stat-label">With Arrears</div></div>
    </div>
  </div>
</header>

<div id="save-warning">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#C0392B" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v5M12 16h.01"/></svg>
  Changes may not be saved permanently in this session.
</div>

<div class="container">
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8A93A6" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Search by name, roll no, or email…">
    </div>
    <select id="filter-dept">
      <option value="All">All departments</option>
    </select>
    <button class="add-btn" id="btn-open-new">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      Add Student
    </button>
  </div>

  <div id="grid-wrap"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal fade-in" id="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Add New Student</h2>
      <button class="icon-btn" id="btn-close-modal">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <form id="student-form">
      <div class="form-field">
        <label class="field-label">Student Name</label>
        <input class="input" id="f-name" type="text" placeholder="e.g. Karthik Raja">
        <span class="error-text" id="err-name" style="display:none;"></span>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label class="field-label">Roll Number</label>
          <input class="input" id="f-roll" type="text" placeholder="e.g. 21ITR045">
          <span class="error-text" id="err-roll" style="display:none;"></span>
        </div>
        <div class="form-field">
          <label class="field-label">Year</label>
          <select class="input" id="f-year"></select>
        </div>
      </div>
      <div class="form-field">
        <label class="field-label">Department</label>
        <select class="input" id="f-department"></select>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label class="field-label">CGPA</label>
          <input class="input" id="f-cgpa" type="text" placeholder="e.g. 8.5" inputmode="decimal">
          <span class="error-text" id="err-cgpa" style="display:none;"></span>
        </div>
        <div class="form-field">
          <label class="field-label">Arrears</label>
          <input class="input" id="f-arrears" type="text" placeholder="0" inputmode="numeric">
          <span class="error-text" id="err-arrears" style="display:none;"></span>
        </div>
      </div>
      <div class="form-field">
        <label class="field-label">Leave Count (days taken)</label>
        <input class="input" id="f-leaves" type="text" placeholder="0" inputmode="numeric">
        <span class="error-text" id="err-leaves" style="display:none;"></span>
      </div>
      <div class="form-field">
        <label class="field-label">Email (optional)</label>
        <input class="input" id="f-email" type="text" placeholder="student@avcce.edu.in">
        <span class="error-text" id="err-email" style="display:none;"></span>
      </div>
      <div class="modal-actions">
        <button type="button" class="cancel-btn" id="btn-cancel-modal">Cancel</button>
        <button type="submit" class="save-btn" id="btn-save">Add Student</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  const STORAGE_KEY = "avc:students";
  const DEPARTMENTS = [
    "Information Technology",
    "Computer Science",
    "Electronics & Communication",
    "Electrical & Electronics",
    "Mechanical",
    "Civil",
  ];
  const DEPT_COLORS = {
    "Information Technology": { bg: "#E8F0FE", fg: "#1A4FBF", dot: "#3B6FE0" },
    "Computer Science": { bg: "#EAF7EE", fg: "#1E7B3A", dot: "#2FA84F" },
    "Electronics & Communication": { bg: "#FDF1E7", fg: "#B15B12", dot: "#E08A34" },
    "Electrical & Electronics": { bg: "#FBEFF5", fg: "#A22A6A", dot: "#D8478F" },
    "Mechanical": { bg: "#F1EEFB", fg: "#5B3AA8", dot: "#8163D6" },
    "Civil": { bg: "#EFF6F7", fg: "#166E77", dot: "#2C9BA6" },
  };
  const YEARS = ["1st Year", "2nd Year", "3rd Year", "4th Year"];

  // Storage adapter: uses Claude's window.storage when available (in-app artifacts),
  // falls back to localStorage for standalone files opened directly in a browser
  // or a local HTML preview app, and falls back further to an in-memory object
  // if even localStorage is blocked.
  const memoryFallback = {};
  const storageAdapter = {
    async get(key){
      if (window.storage && typeof window.storage.get === 'function'){
        try { return await window.storage.get(key, false); }
        catch(e) { /* fall through to localStorage */ }
      }
      try {
        const v = window.localStorage ? localStorage.getItem(key) : null;
        return v !== null ? { value: v } : null;
      } catch(e) {
        return memoryFallback[key] !== undefined ? { value: memoryFallback[key] } : null;
      }
    },
    async set(key, value){
      if (window.storage && typeof window.storage.set === 'function'){
        try {
          const res = await window.storage.set(key, value, false);
          if (res) return res;
        } catch(e) { /* fall through to localStorage */ }
      }
      try {
        if (window.localStorage) { localStorage.setItem(key, value); return { key, value }; }
      } catch(e) { /* fall through to memory */ }
      memoryFallback[key] = value;
      return { key, value };
    }
  };

  let students = [];
  let query = "";
  let deptFilter = "All";
  let editingId = null;
  let confirmDeleteId = null;

  function uid(){ return "AVC" + Math.floor(1000 + Math.random() * 9000); }
  function initials(name){
    const parts = name.trim().split(/\s+/);
    return ((parts[0]?.[0] || "") + (parts[1]?.[0] || "")).toUpperCase();
  }
  function escapeHtml(str){
    return (str||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  // Populate static selects
  const filterDeptEl = document.getElementById('filter-dept');
  DEPARTMENTS.forEach(d => {
    filterDeptEl.insertAdjacentHTML('beforeend', `<option value="${d}">${d}</option>`);
  });
  const fDept = document.getElementById('f-department');
  DEPARTMENTS.forEach(d => fDept.insertAdjacentHTML('beforeend', `<option value="${d}">${d}</option>`));
  const fYear = document.getElementById('f-year');
  YEARS.forEach(y => fYear.insertAdjacentHTML('beforeend', `<option value="${y}">${y}</option>`));

  async function loadData(){
    try{
      const res = await storageAdapter.get(STORAGE_KEY);
      students = (res && res.value) ? JSON.parse(res.value) : [];
    } catch(e){
      students = [];
    }
    render();
  }

  async function persist(){
    try{
      const res = await storageAdapter.set(STORAGE_KEY, JSON.stringify(students));
      document.getElementById('save-warning').style.display = res ? 'none' : 'flex';
    } catch(e){
      document.getElementById('save-warning').style.display = 'flex';
    }
  }

  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => t.classList.remove('show'), 2200);
  }

  function getFiltered(){
    const q = query.trim().toLowerCase();
    return students
      .filter(s => deptFilter === 'All' || s.department === deptFilter)
      .filter(s => !q || s.name.toLowerCase().includes(q) || s.roll.toLowerCase().includes(q) || (s.email||'').toLowerCase().includes(q))
      .sort((a,b) => a.name.localeCompare(b.name));
  }

  function updateStats(){
    document.getElementById('stat-total').textContent = students.length;
    document.getElementById('stat-depts').textContent = new Set(students.map(s => s.department)).size;
    const gpas = students.map(s => parseFloat(s.cgpa)).filter(n => !isNaN(n));
    document.getElementById('stat-cgpa').textContent = gpas.length ? (gpas.reduce((a,b)=>a+b,0)/gpas.length).toFixed(2) : '—';
    document.getElementById('stat-arrears').textContent = students.filter(s => Number(s.arrears) > 0).length;
  }

  function renderGrid(){
    const wrap = document.getElementById('grid-wrap');
    const filtered = getFiltered();

    if(filtered.length === 0){
      wrap.innerHTML = `
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#C3CAD9" stroke-width="1.75"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <p class="empty-text">${students.length === 0 ? 'No students added yet.' : 'No records match your search.'}</p>
          ${students.length === 0 ? `<button class="add-btn" id="btn-empty-add"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>Add your first student</button>` : ''}
        </div>`;
      const btn = document.getElementById('btn-empty-add');
      if(btn) btn.addEventListener('click', openNew);
      return;
    }

    let html = '<div class="grid">';
    filtered.forEach(s => {
      const c = DEPT_COLORS[s.department] || DEPT_COLORS["Information Technology"];
      html += `
        <div class="card fade-in" data-id="${s.id}">
          <div class="card-top">
            <div class="avatar" style="background:${c.dot};">${escapeHtml(initials(s.name))}</div>
            <div style="flex:1;min-width:0;">
              <div class="card-name">${escapeHtml(s.name)}</div>
              <div class="card-roll">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#8A93A6" stroke-width="2"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>
                ${escapeHtml(s.roll)}
              </div>
            </div>
            <div class="card-actions">
              <button class="icon-btn btn-edit" data-id="${s.id}" title="Edit">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#5B667A" stroke-width="2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
              </button>
              <button class="icon-btn btn-delete" data-id="${s.id}" title="Delete">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C0392B" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
              </button>
            </div>
          </div>
          <div class="dept-pill" style="background:${c.bg};color:${c.fg};">${escapeHtml(s.department)}</div>
          <div class="badge-row">
            ${s.cgpa ? `<span class="mini-badge cgpa-badge">CGPA ${escapeHtml(s.cgpa)}</span>` : ''}
            <span class="mini-badge leave-badge">${Number(s.leaves)||0} leave${Number(s.leaves) === 1 ? '' : 's'}</span>
            <span class="mini-badge ${Number(s.arrears) > 0 ? 'arrears-badge-alert' : 'arrears-badge-clear'}">${Number(s.arrears) > 0 ? Number(s.arrears) + ' arrear' + (Number(s.arrears) === 1 ? '' : 's') : 'No arrears'}</span>
          </div>
          <div class="card-meta">
            <span>${escapeHtml(s.year)}</span>
            ${s.email ? `<span style="display:flex;align-items:center;gap:4px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#8A93A6" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg>${escapeHtml(s.email)}</span>` : ''}
          </div>
          ${confirmDeleteId === s.id ? `
            <div class="confirm-bar">
              <span style="font-size:12.5px;color:#5B667A;">Delete this record?</span>
              <div style="display:flex;gap:8px;">
                <button class="confirm-delete-btn" data-id="${s.id}">Delete</button>
                <button class="confirm-cancel-btn" id="btn-cancel-delete">Cancel</button>
              </div>
            </div>
          ` : ''}
        </div>`;
    });
    html += '</div>';
    wrap.innerHTML = html;

    wrap.querySelectorAll('.btn-edit').forEach(btn => {
      btn.addEventListener('click', () => openEdit(btn.getAttribute('data-id')));
    });
    wrap.querySelectorAll('.btn-delete').forEach(btn => {
      btn.addEventListener('click', () => { confirmDeleteId = btn.getAttribute('data-id'); render(); });
    });
    const cancelDeleteBtn = document.getElementById('btn-cancel-delete');
    if(cancelDeleteBtn) cancelDeleteBtn.addEventListener('click', () => { confirmDeleteId = null; render(); });
    wrap.querySelectorAll('.confirm-delete-btn').forEach(btn => {
      btn.addEventListener('click', () => doDelete(btn.getAttribute('data-id')));
    });
  }

  function render(){
    updateStats();
    renderGrid();
  }

  function clearErrors(){
    ['name','roll','email','cgpa','arrears','leaves'].forEach(f => {
      document.getElementById('err-' + f).style.display = 'none';
      document.getElementById('f-' + f).classList.remove('error');
    });
  }

  function openNew(){
    editingId = null;
    document.getElementById('modal-title').textContent = 'Add New Student';
    document.getElementById('btn-save').textContent = 'Add Student';
    document.getElementById('f-name').value = '';
    document.getElementById('f-roll').value = '';
    document.getElementById('f-department').value = DEPARTMENTS[0];
    document.getElementById('f-year').value = YEARS[0];
    document.getElementById('f-email').value = '';
    document.getElementById('f-cgpa').value = '';
    document.getElementById('f-arrears').value = '0';
    document.getElementById('f-leaves').value = '0';
    clearErrors();
    document.getElementById('modal-overlay').classList.add('open');
  }

  function openEdit(id){
    const s = students.find(x => x.id === id);
    if(!s) return;
    editingId = id;
    document.getElementById('modal-title').textContent = 'Edit Student';
    document.getElementById('btn-save').textContent = 'Save Changes';
    document.getElementById('f-name').value = s.name;
    document.getElementById('f-roll').value = s.roll;
    document.getElementById('f-department').value = s.department;
    document.getElementById('f-year').value = s.year;
    document.getElementById('f-email').value = s.email || '';
    document.getElementById('f-cgpa').value = s.cgpa || '';
    document.getElementById('f-arrears').value = s.arrears != null ? s.arrears : '0';
    document.getElementById('f-leaves').value = s.leaves != null ? s.leaves : '0';
    clearErrors();
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal(){
    document.getElementById('modal-overlay').classList.remove('open');
    editingId = null;
    clearErrors();
  }

  function validate(f){
    const errs = {};
    if(!f.name.trim()) errs.name = 'Name is required';
    if(!f.roll.trim()) errs.roll = 'Roll number is required';
    else if(students.some(s => s.roll.toLowerCase() === f.roll.trim().toLowerCase() && s.id !== editingId))
      errs.roll = 'This roll number is already in use';
    if(f.email && !/^\S+@\S+\.\S+$/.test(f.email)) errs.email = 'Enter a valid email';
    if(f.cgpa !== '' ){
      const n = parseFloat(f.cgpa);
      if(isNaN(n) || n < 0 || n > 10) errs.cgpa = 'CGPA must be between 0 and 10';
    }
    if(f.arrears !== ''){
      const n = Number(f.arrears);
      if(!Number.isInteger(n) || n < 0) errs.arrears = 'Enter a whole number, 0 or more';
    }
    if(f.leaves !== ''){
      const n = Number(f.leaves);
      if(!Number.isInteger(n) || n < 0) errs.leaves = 'Enter a whole number, 0 or more';
    }
    return errs;
  }

  function showErrors(errs){
    clearErrors();
    Object.keys(errs).forEach(f => {
      const el = document.getElementById('err-' + f);
      el.textContent = errs[f];
      el.style.display = 'block';
      document.getElementById('f-' + f).classList.add('error');
    });
  }

  async function submitForm(e){
    e.preventDefault();
    const f = {
      name: document.getElementById('f-name').value,
      roll: document.getElementById('f-roll').value,
      department: document.getElementById('f-department').value,
      year: document.getElementById('f-year').value,
      email: document.getElementById('f-email').value,
      cgpa: document.getElementById('f-cgpa').value.trim(),
      arrears: document.getElementById('f-arrears').value.trim() || '0',
      leaves: document.getElementById('f-leaves').value.trim() || '0',
    };
    const errs = validate(f);
    if(Object.keys(errs).length){ showErrors(errs); return; }

    if(editingId){
      students = students.map(s => s.id === editingId ? { ...f, id: editingId } : s);
      await persist();
      showToast('Record updated');
    } else {
      students.push({ ...f, id: uid() });
      await persist();
      showToast('Student added');
    }
    closeModal();
    render();
  }

  async function doDelete(id){
    students = students.filter(s => s.id !== id);
    await persist();
    confirmDeleteId = null;
    showToast('Record deleted');
    render();
  }

  document.getElementById('search').addEventListener('input', e => { query = e.target.value; render(); });
  document.getElementById('filter-dept').addEventListener('change', e => { deptFilter = e.target.value; render(); });
  document.getElementById('btn-open-new').addEventListener('click', openNew);
  document.getElementById('btn-close-modal').addEventListener('click', closeModal);
  document.getElementById('btn-cancel-modal').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => { if(e.target.id === 'modal-overlay') closeModal(); });
  document.getElementById('student-form').addEventListener('submit', submitForm);

  try {
    loadData();
  } catch(e) {
    document.getElementById('grid-wrap').innerHTML =
      '<div class="empty-state"><p class="empty-text">Something went wrong loading the page. Try opening this file in a standard browser (Chrome/Firefox) if you\'re using an in-app previewer.</p></div>';
  }
})();
</script>ff
